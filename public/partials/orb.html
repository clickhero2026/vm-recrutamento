<!-- Orbe do agente Vera: laranja sobre preto. Estados via classe:
     vm-orb--idle (parado) | vm-orb--falando (brilho pulsante) | vm-orb--gravando (anel).
     Fase 0: so o visual (CSS). A logica de estado entra na Fase 3. -->
<div class="vm-orb vm-orb--idle" data-estado="idle" aria-hidden="true">
  <div class="vm-orb__halo"></div>
  <div class="vm-orb__core"></div>
  <div class="vm-orb__ring"></div>
</div>
